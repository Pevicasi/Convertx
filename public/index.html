<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conversor Central</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <h2>Conversor para Central</h2>

  <input type="file" id="videos" accept=".mp4,.avi,.mkv,.mov,.webm,.flv,.wmv,video/*" multiple>

  <div class="link-area">
    <input type="url" id="youtube-link" placeholder="Cole o link do YouTube">
    <button type="button" id="adicionar-link">Adicionar link</button>
  </div>

  <button type="button" id="converter">Converter fila</button>

  <div class="progress">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <p id="status">Aguardando vídeos ou links...</p>

  <ul id="fila"></ul>
</div>

<script src="/script.js"></script>
</body>
</html>
