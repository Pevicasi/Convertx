<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gerador de QR Code Pix Grátis | Pix Copia e Cola</title>
<meta name="description" content="Gere QR Code Pix grátis com valor opcional. Crie Pix Copia e Cola online de forma simples, rápida e segura.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
<h1>Gerador de QR Code Pix</h1>
<p>Crie seu Pix Copia e Cola grátis em poucos segundos.</p>
</header>

<main class="container">
<section class="card">
<label>Chave Pix</label>
<input id="chave" placeholder="CPF, CNPJ, e-mail, telefone ou chave aleatória">

<label>Nome do recebedor</label>
<input id="nome" maxlength="25" placeholder="Ex: JOAO SILVA">

<label>Cidade</label>
<input id="cidade" maxlength="15" placeholder="Ex: SAO PAULO">

<label>Valor opcional</label>
<input id="valor" type="number" step="0.01" min="0" placeholder="Ex: 25.90">

<label>Descrição opcional</label>
<input id="descricao" maxlength="25" placeholder="Ex: pagamento">

<button id="gerar">Gerar QR Code Pix</button>
<p id="erro"></p>
</section>

<section id="resultado" class="card resultado">
<h2>Seu Pix foi gerado</h2>
<canvas id="canvas"></canvas>

<label>Pix Copia e Cola</label>
<textarea id="pixCode" readonly></textarea>

<button id="copiar">Copiar código Pix</button>
<button id="baixar">Baixar QR Code</button>
</section>

<section class="card texto-seo">
<h2>Como usar</h2>
<p>Preencha sua chave Pix, nome, cidade e valor se desejar. Depois clique em gerar. O QR Code Pix poderá ser lido por aplicativos bancários compatíveis.</p>
</section>
</main>

<footer>
<p>Gerador gratuito de QR Code Pix.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
