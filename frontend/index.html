<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConvertX - Conversor de Vídeo e Áudio</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand">
        <span class="brand-icon">↻</span>
        <div>
          <h1>ConvertX</h1>
          <p>Converta vídeos e áudios de forma simples.</p>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="dropArea" class="drop-area">
        <input id="fileInput" type="file" accept="video/*,audio/*" hidden />
        <div class="drop-icon">📁</div>
        <h2>Arraste seu arquivo aqui</h2>
        <p>ou toque para escolher um vídeo ou áudio</p>
        <button id="chooseBtn" class="btn secondary" type="button">Escolher arquivo</button>
      </div>

      <div id="filePanel" class="file-panel hidden">
        <h3>Arquivo analisado</h3>
        <div id="fileInfo" class="info-grid"></div>

        <label class="field">
          <span>Converter para</span>
          <select id="formatSelect">
            <option value="mp4">MP4</option>
            <option value="avi">AVI</option>
            <option value="mkv">MKV</option>
            <option value="mov">MOV</option>
            <option value="webm">WEBM</option>
            <option value="mp3">MP3</option>
            <option value="aac">AAC</option>
            <option value="wav">WAV</option>
            <option value="ogg">OGG</option>
            <option value="corolla">Corolla XEi 2013/2014</option>
          </select>
        </label>

        <button id="convertBtn" class="btn primary" type="button">Converter</button>
      </div>

      <div id="statusBox" class="status hidden"></div>

      <div id="downloadPanel" class="download-panel hidden">
        <h3>Conversão concluída</h3>
        <p>Baixe o arquivo agora. Após o download, ele será removido do servidor.</p>
        <a id="downloadLink" class="btn primary" href="#">Baixar arquivo</a>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
